<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nuestros Momentos - Para KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== VARIABLES GLOBALES ===== */
        :root {
            --primary-color: #ff6b8b;
            --secondary-color: #ff2e63;
            --accent-color: #ffd700;
            --light-color: #fff0f5;
            --dark-color: #1a1a2e;
            --gradient: linear-gradient(135deg, #ff6b8b, #ff2e63);
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe6f2 100%);
            color: #333;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animación de fondo */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(-45deg, #ff6b8b, #ffb6c1, #ffccd5, #ff6b8b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* ===== ESTILOS DE LA GALERÍA ===== */
        .gallery-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 20px;
        }

        .gallery-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-bottom: 40px;
            text-align: center;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .gallery-filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .gallery-filter {
            padding: 8px 20px;
            border: 2px solid var(--secondary-color);
            background: white;
            color: var(--secondary-color);
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .gallery-filter:hover, .gallery-filter.active {
            background: var(--gradient);
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            height: 250px;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .gallery-item:active {
            transform: scale(0.98);
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }

        .gallery-date {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .gallery-description {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Modal de fotos */
        .photo-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .photo-modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
        }

        .photo-modal-img {
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 10px;
        }

        .modal-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 0 0 10px 10px;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-modal:hover {
            color: var(--accent-color);
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .modal-nav-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }

        .modal-nav-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        /* Botón volver */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .back-button a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--gradient);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            transition: var(--transition);
            font-weight: 500;
            box-shadow: var(--shadow);
        }

        .back-button a:hover {
            transform: translateX(-5px);
        }

        /* Sección de subida */
        .upload-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-top: 50px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .upload-section h3 {
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .upload-section p {
            color: #666;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 20px;
            font-weight: 500;
        }

        .upload-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 107, 139, 0.4);
        }

        .upload-input {
            display: none;
        }

        /* Notificación */
        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gradient);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            z-index: 10001;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            font-weight: 500;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .notification.show {
            opacity: 1;
        }

        /* ===== RESPONSIVE DESIGN ===== */
        /* Tablets y móviles grandes */
        @media (max-width: 992px) {
            .gallery-container {
                margin-top: 90px;
                padding: 15px;
            }
            
            .gallery-title {
                font-size: 3rem;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
            }
        }

        /* Móviles */
        @media (max-width: 768px) {
            .gallery-container {
                margin-top: 80px;
                padding: 12px;
            }
            
            .gallery-title {
                font-size: 2.2rem;
                margin-bottom: 25px;
            }
            
            .gallery-filters {
                gap: 10px;
                margin-bottom: 25px;
            }
            
            .gallery-filter {
                padding: 6px 15px;
                font-size: 0.8rem;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }
            
            .gallery-item {
                height: 180px;
                border-radius: 15px;
            }
            
            .gallery-overlay {
                padding: 12px;
            }
            
            .gallery-date {
                font-size: 0.7rem;
            }
            
            .gallery-description {
                font-size: 0.85rem;
            }
            
            /* Modal en móvil */
            .photo-modal-content {
                max-width: 95%;
            }
            
            .photo-modal-img {
                max-height: 70vh;
            }
            
            .modal-info {
                padding: 12px;
            }
            
            .modal-info .gallery-date {
                font-size: 0.7rem;
            }
            
            .modal-info .gallery-description {
                font-size: 0.85rem;
            }
            
            .close-modal {
                top: -35px;
                font-size: 1.8rem;
            }
            
            .modal-nav-btn {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            
            .modal-nav {
                padding: 0 10px;
            }
            
            /* Botón volver en móvil */
            .back-button {
                top: 10px;
                left: 10px;
            }
            
            .back-button a {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            
            /* Sección subida */
            .upload-section {
                padding: 20px;
                margin-top: 30px;
            }
            
            .upload-section h3 {
                font-size: 1.2rem;
            }
            
            .upload-section p {
                font-size: 0.85rem;
            }
            
            .upload-btn {
                padding: 10px 25px;
                font-size: 0.9rem;
            }
            
            .notification {
                font-size: 0.85rem;
                white-space: normal;
                text-align: center;
                max-width: 90%;
                padding: 10px 20px;
            }
        }

        /* Móviles muy pequeños */
        @media (max-width: 480px) {
            .gallery-title {
                font-size: 1.8rem;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }
            
            .gallery-item {
                height: 150px;
            }
            
            .gallery-filter {
                padding: 5px 12px;
                font-size: 0.7rem;
            }
            
            .modal-nav-btn {
                width: 35px;
                height: 35px;
                font-size: 1rem;
            }
        }

        /* Orientación horizontal en móvil */
        @media (max-width: 768px) and (orientation: landscape) {
            .gallery-container {
                margin-top: 70px;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
            
            .gallery-item {
                height: 160px;
            }
            
            .photo-modal-img {
                max-height: 60vh;
            }
        }

        /* Eliminar hover en táctiles (mejor experiencia) */
        @media (hover: none) and (pointer: coarse) {
            .gallery-item:hover {
                transform: none;
            }
            
            .gallery-item:hover .gallery-img {
                transform: none;
            }
            
            .gallery-item:hover .gallery-overlay {
                transform: translateY(100%);
            }
            
            .gallery-item:active .gallery-overlay {
                transform: translateY(0);
            }
            
            .gallery-filter:hover {
                transform: none;
            }
            
            .modal-nav-btn:hover {
                transform: none;
            }
        }

        /* Aumentar área táctil en móvil */
        @media (max-width: 768px) {
            .gallery-filter,
            .modal-nav-btn,
            .upload-btn,
            .back-button a {
                min-height: 44px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    <div id="particles-js"></div>
    
    <div class="back-button">
        <a href="index.html">
            <i class="fas fa-arrow-left"></i> Volver al inicio
        </a>
    </div>
    
    <div class="gallery-container">
        <h1 class="gallery-title">Nuestros Momentos Especiales</h1>
        
        <div class="gallery-filters">
            <button class="gallery-filter active" data-filter="all">Todos</button>
            <button class="gallery-filter" data-filter="together">Juntos</button>
            <button class="gallery-filter" data-filter="dates">Citas</button>
            <button class="gallery-filter" data-filter="special">Especiales</button>
            <button class="gallery-filter" data-filter="future">Futuro</button>
        </div>
        
        <div class="gallery-grid" id="gallery-grid"></div>
        
        <div class="upload-section">
            <h3>✨ ¿Quieres añadir nuestros recuerdos?</h3>
            <p>Sube fotos especiales de nosotros (solo en tu dispositivo)</p>
            <label for="photo-upload" class="upload-btn">
                <i class="fas fa-cloud-upload-alt"></i> Subir Foto
            </label>
            <input type="file" id="photo-upload" class="upload-input" accept="image/*">
        </div>
    </div>
    
    <div class="photo-modal" id="photo-modal">
        <div class="photo-modal-content">
            <span class="close-modal" id="close-photo-modal">&times;</span>
            <img class="photo-modal-img" id="modal-image" src="" alt="">
            <div class="modal-info">
                <div class="gallery-date" id="modal-date"></div>
                <div class="gallery-description" id="modal-description"></div>
            </div>
            <div class="modal-nav">
                <button class="modal-nav-btn" id="prev-photo">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="modal-nav-btn" id="next-photo">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // ===== GALERÍA DE FOTOS =====
        const galleryPhotos = [
            {
                id: 1,
                url: "https://images.unsplash.com/photo-1518568814500-bf0f8d125f46?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80",
                title: "Nuestro Primer Viaje",
                date: "Marzo 2024",
                description: "Esa aventura inolvidable donde todo comenzó",
                category: "together"
            },
            {
                id: 2,
                url: "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80",
                title: "Atardecer Perfecto",
                date: "Abril 2024",
                description: "Mirando el sol esconderse juntos",
                category: "dates"
            },
            {
                id: 3,
                url: "https://images.unsplash.com/photo-1542037104857-ffbb0b9155fb?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80",
                title: "Risas Sin Fin",
                date: "Mayo 2024",
                description: "Los momentos más divertidos contigo",
                category: "together"
            },
            {
                id: 4,
                url: "https://images.unsplash.com/photo-1529254479751-fbacb4c7a587?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80",
                title: "Celebración Especial",
                date: "Junio 2024",
                description: "Nuestro primer aniversario juntos",
                category: "special"
            },
            {
                id: 5,
                url: "https://images.unsplash.com/photo-1511988617509-a57c8a288659?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80",
                title: "Sueños Compartidos",
                date: "Futuro",
                description: "Todo lo que aún nos espera por vivir",
                category: "future"
            },
            {
                id: 6,
                url: "https://images.unsplash.com/photo-1542037104857-ffbb0b9155fb?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80",
                title: "Noche de Estrellas",
                date: "Julio 2024",
                description: "Contando estrellas y compartiendo secretos",
                category: "dates"
            }
        ];
        
        let currentPhotoIndex = 0;
        let filteredPhotos = [...galleryPhotos];
        
        const elements = {
            galleryGrid: document.getElementById('gallery-grid'),
            photoModal: document.getElementById('photo-modal'),
            modalImage: document.getElementById('modal-image'),
            modalDate: document.getElementById('modal-date'),
            modalDescription: document.getElementById('modal-description'),
            closePhotoModal: document.getElementById('close-photo-modal'),
            prevPhoto: document.getElementById('prev-photo'),
            nextPhoto: document.getElementById('next-photo'),
            galleryFilters: document.querySelectorAll('.gallery-filter'),
            photoUpload: document.getElementById('photo-upload')
        };
        
        function initGallery() {
            loadGallery();
            setupEventListeners();
            initParticles();
        }
        
        function loadGallery() {
            elements.galleryGrid.innerHTML = '';
            
            filteredPhotos.forEach((photo, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.dataset.index = index;
                item.dataset.category = photo.category;
                
                item.innerHTML = `
                    <img src="${photo.url}" alt="${photo.title}" class="gallery-img" loading="lazy">
                    <div class="gallery-overlay">
                        <div class="gallery-date">${photo.date}</div>
                        <div class="gallery-description">${photo.title}</div>
                    </div>
                `;
                
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPhotoModal(index);
                });
                elements.galleryGrid.appendChild(item);
            });
        }
        
        function openPhotoModal(index) {
            currentPhotoIndex = index;
            const photo = filteredPhotos[index];
            
            elements.modalImage.src = photo.url;
            elements.modalDate.textContent = photo.date;
            elements.modalDescription.textContent = photo.description;
            
            elements.photoModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        
        function closePhotoModal() {
            elements.photoModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        function showPrevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
            const photo = filteredPhotos[currentPhotoIndex];
            elements.modalImage.src = photo.url;
            elements.modalDate.textContent = photo.date;
            elements.modalDescription.textContent = photo.description;
        }
        
        function showNextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % filteredPhotos.length;
            const photo = filteredPhotos[currentPhotoIndex];
            elements.modalImage.src = photo.url;
            elements.modalDate.textContent = photo.date;
            elements.modalDescription.textContent = photo.description;
        }
        
        function filterGallery(category) {
            if (category === 'all') {
                filteredPhotos = [...galleryPhotos];
            } else {
                filteredPhotos = galleryPhotos.filter(photo => photo.category === category);
            }
            loadGallery();
        }
        
        function setupEventListeners() {
            elements.closePhotoModal.addEventListener('click', closePhotoModal);
            elements.prevPhoto.addEventListener('click', showPrevPhoto);
            elements.nextPhoto.addEventListener('click', showNextPhoto);
            
            elements.photoModal.addEventListener('click', (e) => {
                if (e.target === elements.photoModal) {
                    closePhotoModal();
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if (elements.photoModal.style.display === 'block') {
                    if (e.key === 'Escape') closePhotoModal();
                    if (e.key === 'ArrowLeft') showPrevPhoto();
                    if (e.key === 'ArrowRight') showNextPhoto();
                }
            });
            
            elements.galleryFilters.forEach(filter => {
                filter.addEventListener('click', () => {
                    elements.galleryFilters.forEach(f => f.classList.remove('active'));
                    filter.classList.add('active');
                    filterGallery(filter.dataset.filter);
                });
            });
            
            elements.photoUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const newPhoto = {
                            id: galleryPhotos.length + 1,
                            url: event.target.result,
                            title: "Nuevo Recuerdo",
                            date: new Date().toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }),
                            description: "Un momento especial añadido por ti",
                            category: "special"
                        };
                        
                        galleryPhotos.push(newPhoto);
                        const currentFilter = document.querySelector('.gallery-filter.active').dataset.filter;
                        filterGallery(currentFilter);
                        showNotification("✨ ¡Foto añadida a nuestros recuerdos! 📸");
                    };
                    reader.readAsDataURL(file);
                } else {
                    showNotification("❌ Por favor, selecciona una imagen válida");
                }
                e.target.value = '';
            });
        }
        
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification show';
            notification.innerHTML = `<i class="fas fa-heart" style="margin-right: 8px;"></i> ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 500);
            }, 3000);
        }
        
        function initParticles() {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 50, density: { enable: true, value_area: 800 } },
                        color: { value: "#ff6b8b" },
                        shape: { type: "circle" },
                        opacity: { value: 0.5, random: true },
                        size: { value: 3, random: true },
                        line_linked: { enable: false },
                        move: { enable: true, speed: 1, direction: "none", random: true, straight: false, out_mode: "out" }
                    },
                    interactivity: {
                        detect_on: "canvas",
                        events: { onhover: { enable: false }, onclick: { enable: false }, resize: true }
                    }
                });
            }
        }
        
        document.addEventListener('DOMContentLoaded', initGallery);
    </script>
</body>
</html>
