<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✨ Libro Mágico · Para KIM ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --primary: #ff6b8b;
            --secondary: #ff2e63;
            --gold: #ffd966;
            --shadow-xl: 0 25px 45px -12px rgba(0,0,0,0.4);
            --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 10% 20%, #fff0f5, #ffe0ea);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Toolbar flotante superior */
        .toolbar {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(16px);
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            margin: 15px auto;
            max-width: 95%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,107,139,0.3);
            position: sticky;
            top: 12px;
            z-index: 200;
        }
        .tool-btn {
            background: white;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--secondary);
            border: 1px solid #ffccd5;
            transition: var(--transition);
        }
        .tool-btn-primary {
            background: linear-gradient(135deg, #ff6b8b, #ff2e63);
            color: white;
            border: none;
            box-shadow: 0 6px 14px rgba(255,46,99,0.3);
        }
        .tool-btn-danger {
            background: #ffe0e0;
            color: #c0392b;
            border-color: #f5c6cb;
        }
        .tool-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 18px rgba(255,107,139,0.3); }

        /* Vista de edición (modo taller) */
        .editor-view {
            padding: 20px;
        }
        .book-viewer {
            background: #e8dccc;
            border-radius: 48px;
            padding: 40px 20px;
            box-shadow: inset 0 0 0 1px rgba(255,255,200,0.6), var(--shadow-xl);
        }
        .pages-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .book-page {
            width: 380px;
            background: #fffef7;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: var(--transition);
            cursor: grab;
            border: 1px solid rgba(255,215,200,0.8);
        }
        .book-page:active { cursor: grabbing; }
        .book-page:hover { transform: translateY(-6px); }
        .page-header {
            background: #fff5f0;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffe0e7;
        }
        .canvas-container {
            position: relative;
            min-height: 460px;
            background: #fef9ef;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .image-layer {
            position: relative;
            width: 100%;
            height: auto;
        }
        .page-img {
            width: 100%;
            height: auto;
            min-height: 420px;
            object-fit: cover;
            display: block;
            transition: filter 0.2s;
        }
        .draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;
        }
        .blank-placeholder {
            background: #f7f0e3;
            height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #b0a088;
            gap: 12px;
        }
        .page-footer {
            padding: 10px;
            background: #fffaf5;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid #ffe0e7;
        }
        .page-footer button {
            background: #ffe4ed;
            border: none;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .filter-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
            z-index: 5;
        }

        /* ========== MODO LECTURA 3D ========== */
        .reading-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a120e;
            z-index: 10000;
            display: none;
            flex-direction: column;
            overflow: hidden;
            touch-action: pan-y;
        }
        .reading-mode.active { display: flex; }
        .reading-header {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10010;
            display: flex;
            gap: 12px;
        }
        .reading-header button {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .reading-header button:hover { background: var(--primary); transform: scale(1.05); }
        .book-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }
        .book-slider {
            display: flex;
            width: 100%;
            height: 90%;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            will-change: transform;
        }
        .reading-page {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5ecd7;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3);
            overflow: hidden;
        }
        .reading-page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #f5ecd7;
        }
        .page-counter {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 10;
        }
        @keyframes firework {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(5); opacity: 0; }
        }
        .firework {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20001;
            animation: firework 0.9s ease-out forwards;
        }
        .notification-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6b8b, #ff2e63);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            z-index: 20002;
            font-weight: 600;
            animation: fadeSlide 2.2s forwards;
            backdrop-filter: blur(4px);
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateX(-50%) translateY(30px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-card {
            background: white;
            border-radius: 48px;
            padding: 28px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            animation: modalPop 0.3s;
        }
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-card input, .modal-card select {
            width: 100%;
            margin: 12px 0;
            padding: 12px;
            border-radius: 60px;
            border: 2px solid #ffb6c1;
        }
        .drag-over { opacity: 0.6; transform: scale(0.98); }
        @media (max-width: 780px) {
            .book-page { width: 94%; }
            .tool-btn { padding: 6px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="tool-btn" id="addPageBtn"><i class="fas fa-plus-circle"></i> Nueva página</button>
    <button class="tool-btn" id="importImageBtn"><i class="fas fa-image"></i> Subir imagen</button>
    <button class="tool-btn" id="importUrlBtn"><i class="fas fa-link"></i> Desde URL</button>
    <button class="tool-btn tool-btn-primary" id="savePdfBtn"><i class="fas fa-file-pdf"></i> Guardar PDF</button>
    <button class="tool-btn" id="saveProjectBtn"><i class="fas fa-save"></i> Guardar libro</button>
    <button class="tool-btn" id="loadProjectBtn"><i class="fas fa-folder-open"></i> Cargar libro</button>
    <button class="tool-btn" id="resetBookBtn"><i class="fas fa-heart-broken"></i> Reiniciar</button>
    <button class="tool-btn" id="readingModeBtn"><i class="fas fa-book-open"></i> 📖 Modo Lectura</button>
</div>

<div id="editorView" class="editor-view">
    <div class="book-viewer">
        <div class="pages-container" id="pagesContainer"></div>
    </div>
</div>

<div id="readingMode" class="reading-mode">
    <div class="reading-header">
        <button id="closeReadingBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="book-container">
        <div class="book-slider" id="bookSlider"></div>
    </div>
    <div class="page-counter" id="pageCounter">📖 1 / 1</div>
</div>

<!-- Modales -->
<div id="imageModal" class="modal-overlay">
    <div class="modal-card">
        <h3 style="color:#ff6b8b">🖼️ Agregar imagen</h3>
        <input type="file" id="modalFile" accept="image/*">
        <input type="text" id="modalUrl" placeholder="https://...">
        <button id="confirmImageBtn" style="background:linear-gradient(135deg,#ff6b8b,#ff2e63); color:white; border:none; padding:10px; width:100%; border-radius:60px; margin-top:12px;">Insertar</button>
        <button id="closeImageModal" style="margin-top:10px;">Cancelar</button>
    </div>
</div>

<div id="drawToolsModal" class="modal-overlay">
    <div class="modal-card">
        <h3>✏️ Dibujo avanzado</h3>
        <label>Color:</label> <input type="color" id="drawColor" value="#ff2e63">
        <label>Grosor:</label> <input type="range" id="drawWidth" min="1" max="20" value="3">
        <div style="display:flex; gap:10px; margin:15px 0;">
            <button id="enableDrawBtn" class="tool-btn">Activar dibujo</button>
            <button id="clearDrawBtn" class="tool-btn-danger">Limpiar dibujo</button>
        </div>
        <button id="closeDrawModal" class="tool-btn">Cerrar</button>
    </div>
</div>

<div id="filtersModal" class="modal-overlay">
    <div class="modal-card">
        <h3>🎨 Filtros creativos</h3>
        <select id="filterSelect">
            <option value="none">Normal</option>
            <option value="grayscale">Blanco & Negro</option>
            <option value="sepia">Sepia</option>
            <option value="brightness">Brillo +20%</option>
            <option value="contrast">Contraste +30%</option>
        </select>
        <button id="applyFilterBtn" class="tool-btn-primary" style="margin-top:15px;">Aplicar a esta página</button>
        <button id="closeFilterModal" style="margin-top:10px;">Cerrar</button>
    </div>
</div>

<script>
    // ==================== MODELO DE DATOS ====================
    let pages = [];
    let nextId = 1;
    let currentDrawingPageId = null;
    let activeDrawCanvas = null;
    let drawingEnabled = false;

    // Imágenes predeterminadas (sin texto)
    const defaultImages = Array.from({length:10}, (_,i) => `assets/photos/imagen${i+1}.png`);

    function createDefaultBook() {
        let book = [];
        for(let i=0;i<defaultImages.length;i++) {
            book.push({ id: nextId++, elements: [{ type:'image', src: defaultImages[i], filter: 'none' }], drawDataURL: null });
        }
        return book;
    }

    pages = createDefaultBook();

    // Funciones de dibujo (guardar/restaurar)
    function captureDraw(pageId) {
        const canvas = document.querySelector(`.book-page[data-id='${pageId}'] .draw-canvas`);
        if(canvas) {
            const data = canvas.toDataURL();
            const idx = pages.findIndex(p => p.id == pageId);
            if(idx !== -1) pages[idx].drawDataURL = data;
        }
    }

    function restoreDraw(pageId, canvasElem) {
        const page = pages.find(p => p.id == pageId);
        if(page?.drawDataURL && canvasElem) {
            const img = new Image();
            img.src = page.drawDataURL;
            img.onload = () => {
                const ctx = canvasElem.getContext('2d');
                canvasElem.width = canvasElem.clientWidth;
                canvasElem.height = canvasElem.clientHeight;
                ctx.drawImage(img, 0, 0, canvasElem.width, canvasElem.height);
            };
        }
    }

    function setupDrawing(canvas, pageId) {
        let ctx = canvas.getContext('2d');
        let painting = false;
        let lastX=0, lastY=0;
        const resizeCanvas = () => {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            restoreDraw(pageId, canvas);
        };
        resizeCanvas();
        window.addEventListener('resize', () => resizeCanvas());

        const getCoords = (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let cx, cy;
            if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            else { cx = e.clientX; cy = e.clientY; }
            let x = (cx - rect.left) * scaleX;
            let y = (cy - rect.top) * scaleY;
            return { x: Math.min(Math.max(0,x), canvas.width), y: Math.min(Math.max(0,y), canvas.height) };
        };
        const draw = (e) => {
            if(!painting) return;
            e.preventDefault();
            const {x,y} = getCoords(e);
            const color = document.getElementById('drawColor').value;
            const width = document.getElementById('drawWidth').value;
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(lastX,lastY);
            ctx.lineTo(x,y);
            ctx.stroke();
            lastX=x; lastY=y;
            captureDraw(pageId);
        };
        const start = (e) => {
            painting = true;
            const {x,y} = getCoords(e);
            lastX=x; lastY=y;
            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x+0.5, y+0.5);
            ctx.stroke();
            e.preventDefault();
        };
        const end = () => { painting = false; };
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', end);
    }

    function enableDrawing(pageId, canvas) {
        if(currentDrawingPageId) {
            const prev = document.querySelector(`.book-page[data-id='${currentDrawingPageId}'] .draw-canvas`);
            if(prev) prev.style.pointerEvents = 'none';
        }
        currentDrawingPageId = pageId;
        canvas.style.pointerEvents = 'auto';
        setupDrawing(canvas, pageId);
        drawingEnabled = true;
        showToast("✏️ Modo dibujo activado (elige color/grosor)");
        document.getElementById('drawToolsModal').style.display = 'flex';
    }

    function clearDrawOnPage(pageId, canvas) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const idx = pages.findIndex(p => p.id == pageId);
        if(idx !== -1) pages[idx].drawDataURL = null;
        showToast("Dibujo eliminado");
    }

    // Aplicar filtro CSS a imagen
    function applyFilterToPage(pageId, filterType) {
        const page = pages.find(p => p.id == pageId);
        if(page && page.elements[0]) {
            page.elements[0].filter = filterType;
            const imgElement = document.querySelector(`.book-page[data-id='${pageId}'] .page-img`);
            if(imgElement) {
                const filterMap = { none: 'none', grayscale: 'grayscale(100%)', sepia: 'sepia(80%)', brightness: 'brightness(1.2)', contrast: 'contrast(1.3)' };
                imgElement.style.filter = filterMap[filterType] || 'none';
            }
        }
    }

    // ========== RENDERIZADO DEL EDITOR ==========
    function renderEditor() {
        const container = document.getElementById('pagesContainer');
        container.innerHTML = '';
        pages.forEach((page, idx) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'book-page';
            pageDiv.setAttribute('data-id', page.id);
            pageDiv.setAttribute('draggable', 'true');
            pageDiv.addEventListener('dragstart', dragStart);
            pageDiv.addEventListener('dragover', dragOver);
            pageDiv.addEventListener('drop', drop);
            pageDiv.addEventListener('dragend', dragEnd);
            
            const hasImage = page.elements && page.elements[0]?.src;
            const filterClass = page.elements[0]?.filter || 'none';
            const filterStyle = { none: '', grayscale: 'grayscale(1)', sepia: 'sepia(0.8)', brightness: 'brightness(1.2)', contrast: 'contrast(1.3)' }[filterClass];
            
            pageDiv.innerHTML = `
                <div class="page-header">
                    <span><i class="fas fa-heart" style="color:#ff6b8b"></i> Pág. ${idx+1}</span>
                    <div>
                        <button class="draw-page" data-id="${page.id}" style="background:none; border:none; margin-right:6px;"><i class="fas fa-paint-brush"></i></button>
                        <button class="filter-page" data-id="${page.id}" style="background:none; border:none; margin-right:6px;"><i class="fas fa-magic"></i></button>
                        <button class="delete-page" data-id="${page.id}" style="background:none; border:none;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                <div class="canvas-container">
                    <div class="image-layer">
                        ${hasImage ? `<img src="${page.elements[0].src}" class="page-img" style="width:100%; min-height:420px; object-fit:cover; filter: ${filterStyle};" onerror="this.src='https://placehold.co/800x1000?text=Imagen+perdida'">` : 
                        `<div class="blank-placeholder"><i class="fas fa-images fa-3x"></i><p>Sin imagen</p></div>`}
                        <canvas class="draw-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
                    </div>
                </div>
                <div class="page-footer">
                    <button class="replace-img" data-id="${page.id}"><i class="fas fa-exchange-alt"></i> Cambiar imagen</button>
                </div>
            `;
            container.appendChild(pageDiv);
            
            const canvas = pageDiv.querySelector('.draw-canvas');
            restoreDraw(page.id, canvas);
            pageDiv.querySelector('.draw-page').onclick = () => enableDrawing(page.id, canvas);
            pageDiv.querySelector('.filter-page').onclick = () => { window.activeFilterPage = page.id; document.getElementById('filtersModal').style.display = 'flex'; };
            pageDiv.querySelector('.delete-page').onclick = () => deletePage(page.id);
            pageDiv.querySelector('.replace-img').onclick = () => openImageModal(page.id);
        });
    }

    function deletePage(id) {
        if(pages.length === 1) { showToast("No puedes eliminar la última página 💕"); return; }
        pages = pages.filter(p => p.id !== id);
        renderEditor();
    }

    function addBlankPage() {
        pages.push({ id: nextId++, elements: [], drawDataURL: null });
        renderEditor();
        showToast("Nueva página en blanco");
    }

    function addImageToPage(pageId, src) {
        const idx = pages.findIndex(p => p.id === pageId);
        if(idx !== -1) {
            pages[idx].elements = [{ type:'image', src: src, filter: pages[idx].elements?.[0]?.filter || 'none' }];
            renderEditor();
            showToast("Imagen actualizada ✨");
        }
    }

    function openImageModal(pageId) {
        window.targetPageId = pageId;
        document.getElementById('imageModal').style.display = 'flex';
    }

    // Drag & drop reordenar
    let dragIndex = null;
    function dragStart(e) {
        const page = e.target.closest('.book-page');
        if(!page) return;
        dragIndex = pages.findIndex(p => p.id == parseInt(page.dataset.id));
        e.dataTransfer.setData('text/plain', dragIndex);
        page.classList.add('drag-over');
    }
    function dragOver(e) { e.preventDefault(); }
    function drop(e) {
        e.preventDefault();
        const target = e.target.closest('.book-page');
        if(!target || dragIndex === null) return;
        const targetId = parseInt(target.dataset.id);
        const targetIndex = pages.findIndex(p => p.id === targetId);
        if(dragIndex !== targetIndex) {
            const [moved] = pages.splice(dragIndex, 1);
            pages.splice(targetIndex, 0, moved);
            renderEditor();
            showToast("Páginas reordenadas");
        }
        dragIndex = null;
        document.querySelectorAll('.book-page').forEach(p => p.classList.remove('drag-over'));
    }
    function dragEnd(e) { document.querySelectorAll('.book-page').forEach(p => p.classList.remove('drag-over')); dragIndex = null; }

    // ========== MODO LECTURA ==========
    let readingIndex = 0;
    let touchStartX = 0, touchMoveX = 0, isReadingAnim = false;
    function buildReadingSlider() {
        const slider = document.getElementById('bookSlider');
        slider.innerHTML = '';
        pages.forEach(p => {
            const div = document.createElement('div');
            div.className = 'reading-page';
            const src = p.elements[0]?.src || 'https://placehold.co/1000x1400?text=Imagen+no+disponible';
            div.innerHTML = `<img src="${src}" style="width:100%; height:100%; object-fit:contain;">`;
            slider.appendChild(div);
        });
        slider.style.transform = `translateX(0%)`;
    }
    function goToReadingPage(newIdx) {
        if(isReadingAnim) return;
        isReadingAnim = true;
        const slider = document.getElementById('bookSlider');
        slider.style.transition = 'transform 0.45s cubic-bezier(0.2,0.9,0.3,1.1)';
        slider.style.transform = `translateX(-${newIdx * 100}%)`;
        launchFireworks(6);
        setTimeout(() => { readingIndex = newIdx; document.getElementById('pageCounter').innerHTML = `📖 Página ${readingIndex+1} / ${pages.length}`; isReadingAnim = false; }, 450);
    }
    function resetReadingSlider() {
        const slider = document.getElementById('bookSlider');
        slider.style.transition = 'transform 0.3s';
        slider.style.transform = `translateX(-${readingIndex * 100}%)`;
        setTimeout(() => slider.style.transition = '', 300);
    }
    function initReadingEvents() {
        const slider = document.getElementById('bookSlider');
        slider.addEventListener('touchstart', (e) => { if(isReadingAnim) return; touchStartX = e.touches[0].clientX; touchMoveX = 0; e.preventDefault(); });
        slider.addEventListener('touchmove', (e) => { if(isReadingAnim) return; touchMoveX = e.touches[0].clientX - touchStartX; const offset = -readingIndex*100 + (touchMoveX/window.innerWidth)*100; slider.style.transition = 'none'; slider.style.transform = `translateX(${offset}%)`; });
        slider.addEventListener('touchend', () => { if(Math.abs(touchMoveX)>50) { if(touchMoveX>0 && readingIndex>0) goToReadingPage(readingIndex-1); else if(touchMoveX<0 && readingIndex<pages.length-1) goToReadingPage(readingIndex+1); else resetReadingSlider(); } else resetReadingSlider(); touchStartX=0; });
        slider.addEventListener('mousedown', (e) => { if(isReadingAnim) return; touchStartX = e.clientX; touchMoveX = 0; e.preventDefault(); });
        window.addEventListener('mousemove', (e) => { if(touchStartX === 0) return; touchMoveX = e.clientX - touchStartX; const slider = document.getElementById('bookSlider'); const offset = -readingIndex*100 + (touchMoveX/window.innerWidth)*100; slider.style.transition = 'none'; slider.style.transform = `translateX(${offset}%)`; });
        window.addEventListener('mouseup', () => { if(touchStartX !== 0) { if(Math.abs(touchMoveX)>50) { if(touchMoveX>0 && readingIndex>0) goToReadingPage(readingIndex-1); else if(touchMoveX<0 && readingIndex<pages.length-1) goToReadingPage(readingIndex+1); else resetReadingSlider(); } else resetReadingSlider(); touchStartX=0; } });
    }
    function enterReadingMode() { readingIndex=0; document.getElementById('readingMode').classList.add('active'); document.body.style.overflow='hidden'; buildReadingSlider(); initReadingEvents(); document.getElementById('pageCounter').innerHTML = `📖 Página 1 / ${pages.length}`; launchFireworks(12); }
    function exitReadingMode() { document.getElementById('readingMode').classList.remove('active'); document.body.style.overflow=''; launchFireworks(8); showToast("Volviste al editor"); }
    
    function launchFireworks(count=8) {
        for(let i=0;i<count;i++) setTimeout(() => { for(let j=0;j<30;j++) { let f=document.createElement('div'); f.className='firework'; f.style.backgroundColor=['#ff6b8b','#ffd700','#ff2e63','#4caf50','#03a9f4'][Math.floor(Math.random()*5)]; f.style.left=Math.random()*window.innerWidth+'px'; f.style.top=Math.random()*window.innerHeight*0.7+'px'; document.body.appendChild(f); setTimeout(()=>f.remove(),900); } }, i*120);
    }

    // ========== PDF A PÁGINA COMPLETA ==========
    async function exportPDF() {
        showToast("Generando PDF a página completa...");
        const container = document.createElement('div');
        for(let p of pages) {
            const div = document.createElement('div');
            div.style.pageBreakAfter = 'always';
            div.style.display = 'flex';
            div.style.justifyContent = 'center';
            div.style.alignItems = 'center';
            div.style.backgroundColor = '#f5ecd7';
            const img = document.createElement('img');
            img.src = p.elements[0]?.src || 'https://placehold.co/800x1100';
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.maxHeight = '98vh';
            img.style.objectFit = 'contain';
            div.appendChild(img);
            container.appendChild(div);
        }
        document.body.appendChild(container);
        const opt = { margin: [0,0,0,0], filename: 'libro_magico_KIM.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2.5, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        await html2pdf().set(opt).from(container).save();
        document.body.removeChild(container);
        showToast("PDF listo 💖");
    }

    // Guardar / Cargar proyecto
    function saveProject() { localStorage.setItem('magicBook', JSON.stringify({ pages, nextId })); showToast("Libro guardado en el navegador"); }
    function loadProject() { const data = localStorage.getItem('magicBook'); if(data) { const obj = JSON.parse(data); pages = obj.pages; nextId = obj.nextId; renderEditor(); showToast("Libro cargado exitosamente"); } else showToast("No hay libro guardado"); }
    function resetBook() { nextId = 1; pages = createDefaultBook(); renderEditor(); showToast("Libro original restaurado"); }

    function showToast(msg) { let t=document.createElement('div'); t.className='notification-toast'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }

    // Eventos globales
    document.getElementById('addPageBtn').onclick = addBlankPage;
    document.getElementById('importImageBtn').onclick = () => { if(pages.length) openImageModal(pages[0].id); else showToast("Agrega una página primero"); };
    document.getElementById('importUrlBtn').onclick = () => { if(pages.length) openImageModal(pages[0].id); else showToast("Agrega una página"); };
    document.getElementById('savePdfBtn').onclick = exportPDF;
    document.getElementById('saveProjectBtn').onclick = saveProject;
    document.getElementById('loadProjectBtn').onclick = loadProject;
    document.getElementById('resetBookBtn').onclick = resetBook;
    document.getElementById('readingModeBtn').onclick = enterReadingMode;
    document.getElementById('closeReadingBtn').onclick = exitReadingMode;
    document.getElementById('confirmImageBtn').onclick = () => {
        const file = document.getElementById('modalFile').files[0];
        const url = document.getElementById('modalUrl').value;
        if(file) { const r = new FileReader(); r.onload = e => addImageToPage(window.targetPageId, e.target.result); r.readAsDataURL(file); }
        else if(url) addImageToPage(window.targetPageId, url);
        else alert("Selecciona imagen o URL");
        document.getElementById('imageModal').style.display = 'none';
    };
    document.getElementById('closeImageModal').onclick = () => document.getElementById('imageModal').style.display = 'none';
    document.getElementById('enableDrawBtn').onclick = () => { if(currentDrawingPageId) { const canvas = document.querySelector(`.book-page[data-id='${currentDrawingPageId}'] .draw-canvas`); if(canvas) enableDrawing(currentDrawingPageId, canvas); } document.getElementById('drawToolsModal').style.display = 'none'; };
    document.getElementById('clearDrawBtn').onclick = () => { if(currentDrawingPageId) { const canvas = document.querySelector(`.book-page[data-id='${currentDrawingPageId}'] .draw-canvas`); if(canvas) clearDrawOnPage(currentDrawingPageId, canvas); } document.getElementById('drawToolsModal').style.display = 'none'; };
    document.getElementById('closeDrawModal').onclick = () => document.getElementById('drawToolsModal').style.display = 'none';
    document.getElementById('applyFilterBtn').onclick = () => { applyFilterToPage(window.activeFilterPage, document.getElementById('filterSelect').value); document.getElementById('filtersModal').style.display = 'none'; };
    document.getElementById('closeFilterModal').onclick = () => document.getElementById('filtersModal').style.display = 'none';
    
    renderEditor();
    showToast("✨ Bienvenida, KIM. Toca el lápiz para dibujar, filtros para efectos y modo lectura para vivir la magia ✨");
</script>
