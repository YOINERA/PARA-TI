<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Libro Inteligente - Nuestra Historia | Para KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b8b;
            --secondary: #ff2e63;
            --shadow: 0 12px 30px rgba(0,0,0,0.15);
            --radius: 24px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, #fff0f5 0%, #ffe0ea 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Toolbar */
        .toolbar {
            background: rgba(255,255,255,0.96);
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .tool-btn {
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--secondary);
            border: 1px solid #ffccd5;
        }
        .tool-btn-primary {
            background: linear-gradient(135deg, #ff6b8b, #ff2e63);
            color: white;
            border: none;
        }
        .tool-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(255,107,139,0.3); }

        /* Contenedor del libro */
        .book-viewer {
            background: #e8dccc;
            padding: 30px 20px;
            border-radius: 40px;
            box-shadow: var(--shadow);
        }
        .pages-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        /* Cada página - estilo libro */
        .book-page {
            width: 400px;
            min-width: 300px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
            position: relative;
            cursor: grab;
        }
        .book-page:active { cursor: grabbing; }
        .page-header {
            background: #fff5f0;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ffe0e7;
        }
        .page-number {
            font-weight: bold;
            color: var(--primary);
            font-size: 0.85rem;
        }
        .page-actions button {
            background: none;
            border: none;
            margin-left: 8px;
            cursor: pointer;
            font-size: 1rem;
            color: #888;
            transition: 0.1s;
        }
        .page-actions button:hover { color: var(--secondary); }
        
        .canvas-container {
            position: relative;
            background: #fef9ef;
            min-height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .image-layer {
            position: relative;
            width: 100%;
            text-align: center;
        }
        .page-img {
            width: 100%;
            display: block;
            object-fit: contain;
            max-height: 450px;
            pointer-events: auto;
        }
        .draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;
            touch-action: none;
        }
        .blank-placeholder {
            background: #f7f0e3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 420px;
            color: #b0a088;
            font-style: italic;
            gap: 12px;
        }
        .page-footer {
            padding: 10px;
            background: #fffaf5;
            border-top: 1px solid #ffe0e7;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .page-footer button {
            background: #ffe4ed;
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.1s;
        }
        .page-footer button:hover { background: #ffccd5; }

        /* Modal para subir/editar */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            animation: fadeUp 0.3s;
        }
        @keyframes fadeUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-card input, .modal-card select {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 60px;
            border: 2px solid #ffb6c1;
        }
        .img-preview {
            max-width: 100%;
            max-height: 180px;
            margin: 10px 0;
            border-radius: 20px;
        }
        .close-modal-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 20px;
            margin-top: 15px;
        }
        .notification-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6b8b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 3000;
            font-weight: 500;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            animation: fadeInOut 2.5s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        @media (max-width: 880px) {
            .book-page { width: 340px; }
        }
        @media (max-width: 760px) {
            .book-page { width: 100%; max-width: 400px; }
            .toolbar { border-radius: 30px; }
        }
        .zoom-control {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 30px;
            display: flex;
            gap: 8px;
            padding: 4px 8px;
            z-index: 5;
        }
        .zoom-btn {
            background: white;
            border: none;
            border-radius: 30px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .dragging-ghost { opacity: 0.4; background: #ffd9e4; }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="tool-btn" id="addBlankPageBtn"><i class="fas fa-plus-circle"></i> Página Blanca</button>
    <button class="tool-btn" id="importImageBtn"><i class="fas fa-image"></i> Importar Imagen</button>
    <button class="tool-btn" id="importUrlBtn"><i class="fas fa-link"></i> Desde Web</button>
    <button class="tool-btn tool-btn-primary" id="saveAsPdfBtn"><i class="fas fa-file-pdf"></i> Guardar Libro PDF</button>
    <button class="tool-btn" id="resetBookBtn"><i class="fas fa-trash-alt"></i> Nuevo Libro</button>
</div>

<div class="book-viewer">
    <div class="pages-container" id="pagesContainer"></div>
</div>

<!-- MODAL PARA IMPORTAR IMAGEN -->
<div id="imageModal" class="modal-overlay">
    <div class="modal-card">
        <h3><i class="fas fa-heart"></i> Añadir imagen a la página</h3>
        <input type="file" id="modalFileInput" accept="image/*">
        <p>o URL de imagen:</p>
        <input type="text" id="modalUrlInput" placeholder="https://...">
        <div id="modalPreview"></div>
        <button id="confirmAddImageBtn" class="close-modal-btn">Agregar Imagen</button>
        <button id="closeModalBtn" style="background:#ccc; margin-top:10px">Cancelar</button>
    </div>
</div>

<!-- MODAL PARA HERRAMIENTAS DE DIBUJO (color y grosor) -->
<div id="drawToolsModal" class="modal-overlay">
    <div class="modal-card">
        <h3>✏️ Herramientas de Dibujo</h3>
        <label>Color:</label>
        <input type="color" id="drawColor" value="#ff2e63">
        <label>Grosor:</label>
        <input type="range" id="drawWidth" min="1" max="20" value="4">
        <button id="clearDrawingGlobalBtn" class="tool-btn" style="margin:10px 0">Borrar dibujo de esta página</button>
        <button id="closeDrawModalBtn" class="close-modal-btn">Cerrar</button>
    </div>
</div>

<script>
    // ---------- MODELO DE DATOS ----------
    let pages = [];
    let nextId = 1;
    let currentDrawingPageId = null;
    let activeDrawCanvas = null;
    let drawingEnabled = false;

    // ========== HISTORIA PREDEFINIDA CON 10 IMÁGENES (desde assets/photos/) ==========
    const predefinedImages = [
        "assets/photos/imagen1.png", "assets/photos/imagen2.png", "assets/photos/imagen3.png",
        "assets/photos/imagen4.png", "assets/photos/imagen5.png", "assets/photos/imagen6.png",
        "assets/photos/imagen7.png", "assets/photos/imagen8.png", "assets/photos/imagen9.png",
        "assets/photos/imagen10.png"
    ];
    // Textos opcionales para acompañar cada imagen (historia)
    const storyTexts = [
        "El día que nuestros caminos se cruzaron ✨",
        "La primera sonrisa compartida 💕",
        "Nuestra primera cita inolvidable 🍕",
        "Bajo las estrellas, promesas eternas 🌟",
        "Risas y confidencias sin fin 😊",
        "Un abrazo que lo dice todo 🤗",
        "Viajando juntos hacia el futuro 🚗",
        "El amor en cada detalle 🌹",
        "Construyendo sueños contigo 🏠",
        "Te amo, hoy y siempre 💖"
    ];

    // Función para crear libro inicial con 10 páginas (imágenes predeterminadas)
    function createDefaultBook() {
        const newPages = [];
        for (let i = 0; i < predefinedImages.length; i++) {
            newPages.push({
                id: nextId++,
                elements: [{ type: 'image', src: predefinedImages[i], caption: storyTexts[i] }],
                drawDataURL: null,
                zoomLevel: 1
            });
        }
        return newPages;
    }

    // Guardar dibujo en dataURL
    function captureDrawData(pageId) {
        const pageDiv = document.querySelector(`.book-page[data-page-id='${pageId}']`);
        if(pageDiv) {
            const drawCanvas = pageDiv.querySelector('.draw-canvas');
            if(drawCanvas) {
                const dataURL = drawCanvas.toDataURL();
                const pageIndex = pages.findIndex(p => p.id == pageId);
                if(pageIndex !== -1) pages[pageIndex].drawDataURL = dataURL;
            }
        }
    }

    function restoreDrawOnPage(pageId, canvasElem) {
        const pageData = pages.find(p => p.id == pageId);
        if(pageData && pageData.drawDataURL && canvasElem) {
            const img = new Image();
            img.src = pageData.drawDataURL;
            img.onload = () => {
                const ctx = canvasElem.getContext('2d');
                canvasElem.width = canvasElem.clientWidth;
                canvasElem.height = canvasElem.clientHeight;
                ctx.drawImage(img, 0, 0, canvasElem.width, canvasElem.height);
            };
        }
    }

    // Renderizar todas las páginas
    function renderBook() {
        const container = document.getElementById('pagesContainer');
        container.innerHTML = '';
        pages.forEach((page, idx) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'book-page';
            pageDiv.setAttribute('data-page-id', page.id);
            pageDiv.setAttribute('draggable', 'true');
            pageDiv.addEventListener('dragstart', handleDragStart);
            pageDiv.addEventListener('dragover', handleDragOver);
            pageDiv.addEventListener('drop', handleDrop);
            pageDiv.addEventListener('dragend', handleDragEnd);
            
            // Header
            const header = document.createElement('div');
            header.className = 'page-header';
            header.innerHTML = `<span class="page-number">📖 Página ${idx+1}</span>
                                <div class="page-actions">
                                    <button class="delete-page" data-id="${page.id}" title="Eliminar página"><i class="fas fa-trash"></i></button>
                                    <button class="draw-toggle" data-id="${page.id}" title="Dibujar sobre imagen"><i class="fas fa-paint-brush"></i></button>
                                    <button class="edit-caption" data-id="${page.id}" title="Editar texto"><i class="fas fa-pen"></i></button>
                                </div>`;
            
            // Contenedor imagen
            const canvasContainer = document.createElement('div');
            canvasContainer.className = 'canvas-container';
            const imageLayer = document.createElement('div');
            imageLayer.className = 'image-layer';
            
            const hasImage = page.elements && page.elements.length > 0 && page.elements[0].type === 'image';
            if(hasImage) {
                const imgElem = document.createElement('img');
                imgElem.src = page.elements[0].src;
                imgElem.className = 'page-img';
                imgElem.style.transform = `scale(${page.zoomLevel || 1})`;
                imgElem.style.transition = 'transform 0.2s';
                // Pie de foto
                const captionSpan = document.createElement('div');
                captionSpan.style.padding = '8px';
                captionSpan.style.fontSize = '0.8rem';
                captionSpan.style.color = '#a0556e';
                captionSpan.style.fontStyle = 'italic';
                captionSpan.style.textAlign = 'center';
                captionSpan.innerText = page.elements[0].caption || 'Momento especial ❤️';
                imageLayer.appendChild(imgElem);
                imageLayer.appendChild(captionSpan);
                // Controles de zoom
                const zoomDiv = document.createElement('div');
                zoomDiv.className = 'zoom-control';
                zoomDiv.innerHTML = `<button class="zoom-btn" data-id="${page.id}" data-dir="in">🔍+</button>
                                     <button class="zoom-btn" data-id="${page.id}" data-dir="out">🔍-</button>`;
                imageLayer.appendChild(zoomDiv);
            } else {
                const blankDiv = document.createElement('div');
                blankDiv.className = 'blank-placeholder';
                blankDiv.innerHTML = '<i class="fas fa-book-open" style="font-size:3rem;"></i><p>Página en blanco</p><small>Haz clic en importar imagen</small>';
                imageLayer.appendChild(blankDiv);
            }
            
            // Canvas de dibujo
            const drawCanvas = document.createElement('canvas');
            drawCanvas.className = 'draw-canvas';
            drawCanvas.style.position = 'absolute';
            drawCanvas.style.top = '0';
            drawCanvas.style.left = '0';
            drawCanvas.style.width = '100%';
            drawCanvas.style.height = '100%';
            drawCanvas.width = 400;
            drawCanvas.height = 450;
            drawCanvas.style.pointerEvents = 'none';
            drawCanvas.setAttribute('data-page', page.id);
            imageLayer.appendChild(drawCanvas);
            canvasContainer.appendChild(imageLayer);
            
            // Footer
            const footer = document.createElement('div');
            footer.className = 'page-footer';
            footer.innerHTML = `<button class="replace-img" data-id="${page.id}"><i class="fas fa-exchange-alt"></i> Cambiar imagen</button>
                                <button class="clear-draw" data-id="${page.id}"><i class="fas fa-eraser"></i> Limpiar dibujo</button>`;
            
            pageDiv.appendChild(header);
            pageDiv.appendChild(canvasContainer);
            pageDiv.appendChild(footer);
            container.appendChild(pageDiv);
            
            restoreDrawOnPage(page.id, drawCanvas);
            
            // Eventos internos
            header.querySelector('.delete-page').addEventListener('click', () => deletePage(page.id));
            header.querySelector('.draw-toggle').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleDrawingMode(page.id, drawCanvas);
            });
            header.querySelector('.edit-caption').addEventListener('click', () => editCaption(page.id));
            if(hasImage) {
                const zoomInBtn = pageDiv.querySelector('.zoom-btn[data-dir="in"]');
                const zoomOutBtn = pageDiv.querySelector('.zoom-btn[data-dir="out"]');
                if(zoomInBtn) zoomInBtn.addEventListener('click', () => adjustZoom(page.id, 0.1));
                if(zoomOutBtn) zoomOutBtn.addEventListener('click', () => adjustZoom(page.id, -0.1));
            }
            footer.querySelector('.replace-img').addEventListener('click', () => openImageModalForPage(page.id, true));
            footer.querySelector('.clear-draw').addEventListener('click', () => clearDrawingOnPage(page.id, drawCanvas));
        });
    }

    function adjustZoom(pageId, delta) {
        const idx = pages.findIndex(p => p.id === pageId);
        if(idx !== -1 && pages[idx].elements.length) {
            let newZoom = (pages[idx].zoomLevel || 1) + delta;
            newZoom = Math.min(2.5, Math.max(0.6, newZoom));
            pages[idx].zoomLevel = newZoom;
            const imgDiv = document.querySelector(`.book-page[data-page-id='${pageId}'] .page-img`);
            if(imgDiv) imgDiv.style.transform = `scale(${newZoom})`;
        }
    }

    function editCaption(pageId) {
        const idx = pages.findIndex(p => p.id === pageId);
        if(idx !== -1 && pages[idx].elements.length) {
            const newText = prompt("Escribe un pie de foto para este momento:", pages[idx].elements[0].caption || "");
            if(newText !== null) pages[idx].elements[0].caption = newText;
            renderBook();
        }
    }

    function toggleDrawingMode(pageId, canvasElem) {
        if(currentDrawingPageId === pageId && drawingEnabled) {
            drawingEnabled = false;
            canvasElem.style.pointerEvents = 'none';
            currentDrawingPageId = null;
            showToast("Dibujo desactivado");
        } else {
            if(currentDrawingPageId) {
                const prevCanvas = document.querySelector(`.book-page[data-page-id='${currentDrawingPageId}'] .draw-canvas`);
                if(prevCanvas) prevCanvas.style.pointerEvents = 'none';
            }
            drawingEnabled = true;
            currentDrawingPageId = pageId;
            canvasElem.style.pointerEvents = 'auto';
            setupDrawing(canvasElem);
            showToast("✏️ Modo dibujo activado - usa el dedo o mouse");
            // Mostrar modal de herramientas de dibujo
            document.getElementById('drawToolsModal').style.display = 'flex';
        }
    }

    function setupDrawing(canvas) {
        let ctx = canvas.getContext('2d');
        let painting = false;
        let lastX = 0, lastY = 0;
        
        const setCanvasSize = () => {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            const pageId = canvas.getAttribute('data-page');
            const pageData = pages.find(p => p.id == pageId);
            if(pageData && pageData.drawDataURL) {
                const img = new Image();
                img.src = pageData.drawDataURL;
                img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.clearRect(0,0,canvas.width,canvas.height);
            }
        };
        setCanvasSize();
        window.addEventListener('resize', () => setCanvasSize());
        
        const getCoords = (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.min(Math.max(0, x), canvas.width);
            y = Math.min(Math.max(0, y), canvas.height);
            return { x, y };
        };
        
        const draw = (e) => {
            if(!painting) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            const color = document.getElementById('drawColor')?.value || '#ff2e63';
            const width = document.getElementById('drawWidth')?.value || 4;
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x; lastY = y;
            const pageId = canvas.getAttribute('data-page');
            const pageIndex = pages.findIndex(p => p.id == pageId);
            if(pageIndex !== -1) pages[pageIndex].drawDataURL = canvas.toDataURL();
        };
        
        const start = (e) => {
            painting = true;
            const { x, y } = getCoords(e);
            lastX = x; lastY = y;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x+0.5, y+0.5);
            ctx.stroke();
            e.preventDefault();
        };
        const end = () => { painting = false; };
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', end);
    }
    
    function clearDrawingOnPage(pageId, canvasElem) {
        const ctx = canvasElem.getContext('2d');
        ctx.clearRect(0, 0, canvasElem.width, canvasElem.height);
        const idx = pages.findIndex(p => p.id == pageId);
        if(idx !== -1) pages[idx].drawDataURL = null;
        showToast("Dibujo eliminado");
    }
    
    function deletePage(id) {
        if(pages.length === 1) {
            showToast("No puedes eliminar la última página del libro");
            return;
        }
        pages = pages.filter(p => p.id !== id);
        renderBook();
    }
    
    function addBlankPage() {
        const newId = nextId++;
        pages.push({ id: newId, elements: [], drawDataURL: null, zoomLevel: 1 });
        renderBook();
        showToast("Página en blanco agregada");
    }
    
    function addImageToPage(pageId, imageSrc, isReplace = false) {
        const idx = pages.findIndex(p => p.id === pageId);
        if(idx !== -1) {
            if(isReplace || pages[idx].elements.length === 0) {
                pages[idx].elements = [{ type: 'image', src: imageSrc, caption: "Recuerdo especial ❤️" }];
            } else {
                pages[idx].elements.push({ type: 'image', src: imageSrc, caption: "Nuevo recuerdo" });
            }
            renderBook();
            showToast("Imagen añadida correctamente");
        }
    }
    
    function openImageModalForPage(pageId, replaceMode = false) {
        window.tempPageId = pageId;
        window.replaceMode = replaceMode;
        const modal = document.getElementById('imageModal');
        modal.style.display = 'flex';
        document.getElementById('modalFileInput').value = '';
        document.getElementById('modalUrlInput').value = '';
        document.getElementById('modalPreview').innerHTML = '';
    }
    
    document.getElementById('confirmAddImageBtn').onclick = () => {
        const file = document.getElementById('modalFileInput').files[0];
        const url = document.getElementById('modalUrlInput').value.trim();
        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => { addImageToPage(window.tempPageId, e.target.result, window.replaceMode); closeModal(); };
            reader.readAsDataURL(file);
        } else if(url) {
            addImageToPage(window.tempPageId, url, window.replaceMode);
            closeModal();
        } else {
            alert("Selecciona una imagen o URL");
        }
    };
    document.getElementById('closeModalBtn').onclick = closeModal;
    function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
    
    // Cerrar modal dibujo
    document.getElementById('closeDrawModalBtn').onclick = () => document.getElementById('drawToolsModal').style.display = 'none';
    document.getElementById('clearDrawingGlobalBtn').onclick = () => {
        if(currentDrawingPageId) {
            const canvas = document.querySelector(`.book-page[data-page-id='${currentDrawingPageId}'] .draw-canvas`);
            if(canvas) clearDrawingOnPage(currentDrawingPageId, canvas);
        }
        document.getElementById('drawToolsModal').style.display = 'none';
    };
    
    // Drag & drop reordenar
    let dragSrcIndex = null;
    function handleDragStart(e) {
        const pageDiv = e.target.closest('.book-page');
        if(!pageDiv) return;
        const id = parseInt(pageDiv.getAttribute('data-page-id'));
        dragSrcIndex = pages.findIndex(p => p.id === id);
        e.dataTransfer.setData('text/plain', id);
        pageDiv.classList.add('dragging-ghost');
    }
    function handleDragOver(e) { e.preventDefault(); }
    function handleDrop(e) {
        e.preventDefault();
        const targetPage = e.target.closest('.book-page');
        if(!targetPage || dragSrcIndex === null) return;
        const targetId = parseInt(targetPage.getAttribute('data-page-id'));
        const targetIndex = pages.findIndex(p => p.id === targetId);
        if(dragSrcIndex !== targetIndex) {
            const [moved] = pages.splice(dragSrcIndex, 1);
            pages.splice(targetIndex, 0, moved);
            renderBook();
        }
        dragSrcIndex = null;
        document.querySelectorAll('.book-page').forEach(p => p.classList.remove('dragging-ghost'));
    }
    function handleDragEnd(e) { document.querySelectorAll('.book-page').forEach(p => p.classList.remove('dragging-ghost')); dragSrcIndex = null; }
    
    // PDF optimizado: ocupa 90% de la hoja, márgenes mínimos
    async function saveAsPDF() {
        const element = document.getElementById('pagesContainer');
        const opt = {
            margin:        [0.2, 0.2, 0.2, 0.2], // márgenes muy pequeños
            filename:     'libro_nuestra_historia_KIM.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, logging: false, letterRendering: true },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        showToast("✨ Generando PDF con todo el amor...");
        try {
            await html2pdf().set(opt).from(element).save();
            showToast("📖 ¡Libro guardado! Cada página es un tesoro.");
        } catch(err) { showToast("Error: "+err); }
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'notification-toast';
        toast.innerHTML = `<i class="fas fa-heart"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    // Botones principales
    document.getElementById('addBlankPageBtn').onclick = addBlankPage;
    document.getElementById('importImageBtn').onclick = () => { if(pages.length) openImageModalForPage(pages[0].id, false); };
    document.getElementById('importUrlBtn').onclick = () => { if(pages.length) openImageModalForPage(pages[0].id, false); };
    document.getElementById('saveAsPdfBtn').onclick = saveAsPDF;
    document.getElementById('resetBookBtn').onclick = () => { 
        pages = createDefaultBook();
        nextId = pages[pages.length-1].id + 1;
        renderBook();
        showToast("Libro restaurado con la historia especial");
    };
    
    // Inicializar con historia predefinida
    pages = createDefaultBook();
    nextId = pages[pages.length-1].id + 1;
    renderBook();
</script>
</body>
</html>
