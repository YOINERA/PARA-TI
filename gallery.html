<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Libro Virtual - Nuestra Historia | Para KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --primary: #ff6b8b;
            --secondary: #ff2e63;
            --shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, #fff0f5 0%, #ffe0ea 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Toolbar normal */
        .toolbar {
            background: rgba(255,255,255,0.96);
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            margin: 15px auto;
            max-width: 95%;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 10;
        }
        .tool-btn {
            background: white;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--secondary);
            border: 1px solid #ffccd5;
            transition: 0.2s;
        }
        .tool-btn-primary {
            background: linear-gradient(135deg, #ff6b8b, #ff2e63);
            color: white;
            border: none;
        }
        .tool-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(255,107,139,0.3); }

        /* Vista de edición (modo libro normal) */
        .editor-view {
            display: block;
            padding: 20px;
        }
        .book-viewer {
            background: #e8dccc;
            padding: 30px 20px;
            border-radius: 40px;
            box-shadow: var(--shadow);
        }
        .pages-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .book-page {
            width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: grab;
        }
        .book-page:active { cursor: grabbing; }
        .page-header {
            background: #fff5f0;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ffe0e7;
        }
        .canvas-container {
            position: relative;
            min-height: 450px;
            background: #fef9ef;
            flex: 1;
        }
        .image-layer {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .page-img {
            width: 100%;
            height: 100%;
            min-height: 400px;
            object-fit: cover;
            display: block;
        }
        .draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .page-footer {
            padding: 8px;
            background: #fffaf5;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .page-footer button {
            background: #ffe4ed;
            border: none;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* ========== MODO LECTURA (FULLSCREEN) ========== */
        .reading-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2c1e1a;
            z-index: 10000;
            display: none;
            flex-direction: column;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }
        .reading-mode.active {
            display: flex;
        }
        .reading-header {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10010;
            display: flex;
            gap: 15px;
        }
        .reading-header button {
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        .reading-header button:hover { background: var(--primary); transform: scale(1.05); }
        
        .book-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            perspective: 1500px;
        }
        .book-slider {
            display: flex;
            width: 100%;
            height: 90%;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }
        .reading-page {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5ecd7;
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            background-size: cover;
        }
        .reading-page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #f5ecd7;
        }
        .reading-page .page-caption {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px;
            font-size: 0.9rem;
            font-family: 'Dancing Script', cursive;
            backdrop-filter: blur(4px);
        }
        .page-counter {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 10;
        }
        /* Efecto de transición de página (simulación de arrastre) */
        .dragging-effect {
            transition: transform 0.3s ease-out;
        }
        @keyframes firework {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }
        .firework {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20000;
            animation: firework 1s ease-out forwards;
        }

        /* Responsive modo lectura */
        @media (max-width: 768px) {
            .reading-page img { object-fit: cover; }
        }
        .notification-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6b8b;
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            z-index: 20000;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="tool-btn" id="addBlankPageBtn"><i class="fas fa-plus-circle"></i> Pág. Blanca</button>
    <button class="tool-btn" id="importImageBtn"><i class="fas fa-image"></i> Importar Imagen</button>
    <button class="tool-btn" id="importUrlBtn"><i class="fas fa-link"></i> Desde Web</button>
    <button class="tool-btn tool-btn-primary" id="saveAsPdfBtn"><i class="fas fa-file-pdf"></i> Guardar PDF</button>
    <button class="tool-btn" id="resetBookBtn"><i class="fas fa-trash-alt"></i> Nuevo Libro</button>
    <button class="tool-btn" id="readingModeBtn"><i class="fas fa-book-open"></i> 📖 Modo Lectura</button>
</div>

<!-- Vista de edición -->
<div id="editorView" class="editor-view">
    <div class="book-viewer">
        <div class="pages-container" id="pagesContainer"></div>
    </div>
</div>

<!-- MODO LECTURA (pantalla completa) -->
<div id="readingMode" class="reading-mode">
    <div class="reading-header">
        <button id="closeReadingBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="book-container" id="bookContainer">
        <div class="book-slider" id="bookSlider"></div>
    </div>
    <div class="page-counter" id="pageCounter">Página 1 / 1</div>
</div>

<!-- Modal imagen -->
<div id="imageModal" class="modal-overlay">
    <div class="modal-card">
        <h3>Añadir imagen</h3>
        <input type="file" id="modalFileInput" accept="image/*">
        <input type="text" id="modalUrlInput" placeholder="URL imagen" style="margin-top:10px">
        <button id="confirmAddImageBtn" style="margin-top:15px; background:#ff6b8b; color:white; border:none; padding:8px 20px; border-radius:40px">Agregar</button>
        <button id="closeModalBtn" style="margin-top:10px">Cancelar</button>
    </div>
</div>

<script>
    // ---------- DATOS DEL LIBRO ----------
    let pages = [];
    let nextId = 1;
    let currentReadingIndex = 0;
    let startX = 0, isDragging = false;
    
    // Imágenes predefinidas (10)
    const predefinedImages = Array(10).fill().map((_,i) => `assets/photos/imagen${i+1}.png`);
    const storyTexts = ["✨ Primer encuentro ✨","💕 Primera sonrisa 💕","🍕 Primera cita 🍕","🌟 Promesas bajo estrellas 🌟","😊 Risas eternas 😊","🤗 Abrazo infinito 🤗","🚗 Viaje juntos 🚗","🌹 Detalles de amor 🌹","🏠 Construyendo sueños 🏠","💖 Te amo siempre 💖"];

    function createDefaultBook() {
        let arr = [];
        for(let i=0; i<10; i++) {
            arr.push({ id: nextId++, elements: [{ type:'image', src: predefinedImages[i], caption: storyTexts[i] }], drawDataURL: null });
        }
        return arr;
    }

    pages = createDefaultBook();
    
    // Renderizar edición
    function renderEditor() {
        const container = document.getElementById('pagesContainer');
        if(!container) return;
        container.innerHTML = '';
        pages.forEach((page, idx) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'book-page';
            pageDiv.setAttribute('data-id', page.id);
            pageDiv.innerHTML = `
                <div class="page-header">
                    <span>📖 Página ${idx+1}</span>
                    <div>
                        <button class="delete-page" data-id="${page.id}"><i class="fas fa-trash"></i></button>
                        <button class="edit-caption" data-id="${page.id}"><i class="fas fa-pen"></i></button>
                    </div>
                </div>
                <div class="canvas-container">
                    <div class="image-layer">
                        ${page.elements[0] ? `<img src="${page.elements[0].src}" class="page-img" style="width:100%; min-height:380px; object-fit:cover;">` : '<div class="blank-placeholder">Página vacía</div>'}
                    </div>
                </div>
                <div class="page-footer">
                    <button class="replace-img" data-id="${page.id}">🖼 Cambiar imagen</button>
                    <button class="clear-draw" data-id="${page.id}">🧽 Limpiar dibujo</button>
                </div>
            `;
            container.appendChild(pageDiv);
            // eventos
            pageDiv.querySelector('.delete-page')?.addEventListener('click', () => deletePage(page.id));
            pageDiv.querySelector('.edit-caption')?.addEventListener('click', () => editCaption(page.id));
            pageDiv.querySelector('.replace-img')?.addEventListener('click', () => openImageModal(page.id, true));
            pageDiv.querySelector('.clear-draw')?.addEventListener('click', () => { showToast("Dibujo eliminado (demo)"); });
        });
    }

    function deletePage(id) {
        if(pages.length <= 1) { showToast("No puedes eliminar la última página"); return; }
        pages = pages.filter(p => p.id !== id);
        renderEditor();
    }
    function editCaption(id) {
        let page = pages.find(p => p.id === id);
        if(page && page.elements[0]) {
            let newCap = prompt("Nuevo pie de foto:", page.elements[0].caption);
            if(newCap) page.elements[0].caption = newCap;
            renderEditor();
        }
    }
    function openImageModal(pageId, replace) {
        window.targetPageId = pageId;
        document.getElementById('imageModal').style.display = 'flex';
        window.replaceMode = replace;
    }
    function addImageToPage(pageId, src) {
        let page = pages.find(p => p.id === pageId);
        if(page) {
            if(!page.elements[0]) page.elements = [];
            page.elements[0] = { type:'image', src: src, caption: page.elements[0]?.caption || "Momento especial" };
            renderEditor();
            showToast("Imagen actualizada ✅");
        }
    }
    document.getElementById('confirmAddImageBtn').onclick = () => {
        let file = document.getElementById('modalFileInput').files[0];
        let url = document.getElementById('modalUrlInput').value;
        if(file) {
            let reader = new FileReader();
            reader.onload = e => { addImageToPage(window.targetPageId, e.target.result); closeModal(); };
            reader.readAsDataURL(file);
        } else if(url) {
            addImageToPage(window.targetPageId, url);
            closeModal();
        } else { alert("Selecciona imagen o URL"); }
    };
    function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('addBlankPageBtn').onclick = () => { pages.push({ id: nextId++, elements: [], drawDataURL: null }); renderEditor(); showToast("Página blanca agregada"); };
    document.getElementById('importImageBtn').onclick = () => { if(pages.length) openImageModal(pages[0].id, true); };
    document.getElementById('importUrlBtn').onclick = () => { if(pages.length) openImageModal(pages[0].id, true); };
    document.getElementById('resetBookBtn').onclick = () => { pages = createDefaultBook(); nextId = pages[pages.length-1].id+1; renderEditor(); showToast("Libro restaurado"); };
    
    // ========== MODO LECTURA CON DESLIZAMIENTO Y FUEGOS ARTIFICIALES ==========
    let currentIndex = 0;
    let touchStart = 0;
    let touchMove = 0;
    let isAnimating = false;
    
    function enterReadingMode() {
        if(pages.length === 0) { showToast("No hay páginas para leer"); return; }
        currentIndex = 0;
        document.getElementById('readingMode').classList.add('active');
        document.body.style.overflow = 'hidden';
        buildReadingSlider();
        updateReadingCounter();
        // Disparar fuegos artificiales al entrar
        launchFireworks(8);
    }
    
    function buildReadingSlider() {
        const slider = document.getElementById('bookSlider');
        slider.innerHTML = '';
        pages.forEach((page, idx) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'reading-page';
            const imgSrc = page.elements[0]?.src || 'https://via.placeholder.com/800x1000?text=Pagina+en+blanco';
            const caption = page.elements[0]?.caption || '❤️ Nuestra historia ❤️';
            pageDiv.innerHTML = `<img src="${imgSrc}" alt="Página ${idx+1}" style="width:100%; height:100%; object-fit: contain; background:#f5ecd7;"><div class="page-caption">${caption}</div>`;
            slider.appendChild(pageDiv);
        });
        // Eventos táctiles para deslizar con efecto de página real
        slider.addEventListener('touchstart', handleTouchStart, { passive: false });
        slider.addEventListener('touchmove', handleTouchMove, { passive: false });
        slider.addEventListener('touchend', handleTouchEnd);
        slider.addEventListener('mousedown', handleMouseDown);
        slider.addEventListener('mousemove', handleMouseMove);
        slider.addEventListener('mouseup', handleMouseUp);
        slider.style.transform = `translateX(0%)`;
    }
    
    function handleTouchStart(e) {
        if(isAnimating) return;
        touchStart = e.touches[0].clientX;
        touchMove = 0;
        e.preventDefault();
    }
    function handleTouchMove(e) {
        if(isAnimating) return;
        touchMove = e.touches[0].clientX - touchStart;
        const slider = document.getElementById('bookSlider');
        const offset = -currentIndex * 100 + (touchMove / window.innerWidth) * 100;
        slider.style.transition = 'none';
        slider.style.transform = `translateX(${offset}%)`;
        e.preventDefault();
    }
    function handleTouchEnd(e) {
        if(isAnimating) return;
        const threshold = 50;
        if(Math.abs(touchMove) > threshold) {
            if(touchMove > 0 && currentIndex > 0) {
                goToPage(currentIndex - 1, 'left');
            } else if(touchMove < 0 && currentIndex < pages.length - 1) {
                goToPage(currentIndex + 1, 'right');
            } else {
                resetSliderPosition();
            }
        } else {
            resetSliderPosition();
        }
        touchStart = 0;
        touchMove = 0;
    }
    function handleMouseDown(e) {
        if(isAnimating) return;
        touchStart = e.clientX;
        touchMove = 0;
        e.preventDefault();
    }
    function handleMouseMove(e) {
        if(isAnimating || touchStart === 0) return;
        touchMove = e.clientX - touchStart;
        const slider = document.getElementById('bookSlider');
        const offset = -currentIndex * 100 + (touchMove / window.innerWidth) * 100;
        slider.style.transition = 'none';
        slider.style.transform = `translateX(${offset}%)`;
    }
    function handleMouseUp(e) {
        if(isAnimating || touchStart === 0) return;
        const threshold = 50;
        if(Math.abs(touchMove) > threshold) {
            if(touchMove > 0 && currentIndex > 0) {
                goToPage(currentIndex - 1, 'left');
            } else if(touchMove < 0 && currentIndex < pages.length - 1) {
                goToPage(currentIndex + 1, 'right');
            } else {
                resetSliderPosition();
            }
        } else {
            resetSliderPosition();
        }
        touchStart = 0;
        touchMove = 0;
    }
    
    function goToPage(newIndex, direction) {
        if(isAnimating) return;
        isAnimating = true;
        const slider = document.getElementById('bookSlider');
        const targetOffset = -newIndex * 100;
        slider.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
        slider.style.transform = `translateX(${targetOffset}%)`;
        // Efecto de fuegos artificiales al cambiar de página
        launchFireworks(5);
        // Pequeña vibración simulada (opcional)
        setTimeout(() => {
            currentIndex = newIndex;
            updateReadingCounter();
            isAnimating = false;
        }, 400);
    }
    
    function resetSliderPosition() {
        const slider = document.getElementById('bookSlider');
        slider.style.transition = 'transform 0.3s ease-out';
        slider.style.transform = `translateX(-${currentIndex * 100}%)`;
        setTimeout(() => { slider.style.transition = ''; }, 300);
    }
    
    function updateReadingCounter() {
        const counter = document.getElementById('pageCounter');
        if(counter) counter.innerText = `📖 Página ${currentIndex+1} / ${pages.length}`;
    }
    
    // FUEGOS ARTIFICIALES ESPECTACULARES
    function launchFireworks(count = 8) {
        for(let i=0; i<count; i++) {
            setTimeout(() => {
                const colors = ['#ff6b8b', '#ffd700', '#ff2e63', '#4caf50', '#2196f3', '#9c27b0'];
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight * 0.7;
                for(let j=0; j<20; j++) {
                    const fire = document.createElement('div');
                    fire.className = 'firework';
                    fire.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                    fire.style.left = x + (Math.random() - 0.5) * 80 + 'px';
                    fire.style.top = y + (Math.random() - 0.5) * 80 + 'px';
                    fire.style.width = fire.style.height = (6 + Math.random() * 12) + 'px';
                    fire.style.position = 'fixed';
                    document.body.appendChild(fire);
                    setTimeout(() => fire.remove(), 1000);
                }
                // sonido simulado con efecto visual
            }, i * 120);
        }
    }
    
    document.getElementById('readingModeBtn').onclick = () => enterReadingMode();
    document.getElementById('closeReadingBtn').onclick = () => {
        document.getElementById('readingMode').classList.remove('active');
        document.body.style.overflow = '';
        launchFireworks(6); // fuegos al salir también
        showToast("Modo lectura cerrado 💖");
    };
    
    // ========== PDF CON IMAGEN A PÁGINA COMPLETA (OCUPA 95% DE LA HOJA) ==========
    async function saveAsFullPDF() {
        showToast("Generando PDF a página completa...");
        // Clonamos las páginas para el PDF sin bordes, con imagen que ocupe todo
        const pdfContainer = document.createElement('div');
        pdfContainer.style.width = '100%';
        pdfContainer.style.backgroundColor = '#f5ecd7';
        pdfContainer.style.padding = '0';
        pdfContainer.style.margin = '0';
        
        for(let i=0; i<pages.length; i++) {
            const pageDiv = document.createElement('div');
            pageDiv.style.width = '100%';
            pageDiv.style.height = 'auto';
            pageDiv.style.pageBreakAfter = 'always';
            pageDiv.style.backgroundColor = '#f5ecd7';
            pageDiv.style.display = 'flex';
            pageDiv.style.justifyContent = 'center';
            pageDiv.style.alignItems = 'center';
            pageDiv.style.flexDirection = 'column';
            
            const imgSrc = pages[i].elements[0]?.src || 'https://via.placeholder.com/800x1050?text=Imagen+no+disponible';
            const caption = pages[i].elements[0]?.caption || '';
            
            // IMAGEN que ocupe el 95% del alto de la hoja A4 (relación ~1:1.414)
            const imgElem = document.createElement('img');
            imgElem.src = imgSrc;
            imgElem.style.width = '100%';
            imgElem.style.height = 'auto';
            imgElem.style.maxHeight = '95vh';
            imgElem.style.objectFit = 'contain';
            imgElem.style.display = 'block';
            imgElem.style.margin = '0 auto';
            
            const captionElem = document.createElement('div');
            captionElem.innerText = caption;
            captionElem.style.textAlign = 'center';
            captionElem.style.fontFamily = 'Dancing Script, cursive';
            captionElem.style.fontSize = '16px';
            captionElem.style.color = '#a0556e';
            captionElem.style.padding = '8px';
            captionElem.style.backgroundColor = '#fff5f0';
            captionElem.style.width = '100%';
            
            pageDiv.appendChild(imgElem);
            if(caption) pageDiv.appendChild(captionElem);
            pdfContainer.appendChild(pageDiv);
        }
        
        document.body.appendChild(pdfContainer);
        const opt = {
            margin: [0, 0, 0, 0],  // márgenes CERO
            filename: 'libro_completo_KIM.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2.5, useCORS: true, logging: false, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        try {
            await html2pdf().set(opt).from(pdfContainer).save();
            showToast("✅ PDF listo! Las imágenes ocupan toda la hoja.");
        } catch(e) { showToast("Error: "+e); }
        document.body.removeChild(pdfContainer);
    }
    
    document.getElementById('saveAsPdfBtn').onclick = saveAsFullPDF;
    
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'notification-toast';
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    // Inicializar editor
    renderEditor();
    showToast("✨ Libro listo. Activa el MODO LECTURA para pasar páginas deslizando y ver fuegos artificiales");
</script>
</body>
</html>
