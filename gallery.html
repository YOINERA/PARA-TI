<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Libro Inteligente - Para KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Librerías necesarias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Interactividad de arrastre nativa con soporte táctil -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Evita selección al arrastrar, mejora la experiencia */
        }

        :root {
            --primary: #ff6b8b;
            --secondary: #ff2e63;
            --dark-bg: #1e1e2f;
            --light-bg: #fff9f0;
            --shadow: 0 12px 30px rgba(0,0,0,0.15);
            --radius-lg: 32px;
            --radius-md: 20px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, #fff0f5 0%, #ffe0ea 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: auto;
        }

        /* Contenedor principal tipo libro */
        .book-workspace {
            max-width: 1400px;
            margin: 20px auto;
            background: rgba(255,255,240,0.85);
            backdrop-filter: blur(2px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Toolbar flotante moderno */
        .toolbar {
            background: rgba(255,255,255,0.96);
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tool-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tool-btn {
            background: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--secondary);
            border: 1px solid #ffccd5;
        }
        .tool-btn-primary {
            background: linear-gradient(135deg, #ff6b8b, #ff2e63);
            color: white;
            border: none;
        }
        .tool-btn-primary i { color: white; }
        .tool-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(255,107,139,0.3); }

        /* Área del libro: diseño de doble página adaptable */
        .book-viewer {
            background: #e8dccc;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            min-height: 70vh;
        }
        .pages-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* cada página */
        .book-page {
            width: 380px;
            min-width: 280px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
            border: 1px solid #ffd9e4;
            position: relative;
            cursor: grab;
        }
        .book-page:active { cursor: grabbing; }
        .page-header {
            background: #fff5f0;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ffe0e7;
        }
        .page-number {
            font-weight: bold;
            color: var(--primary);
            font-size: 0.8rem;
        }
        .page-actions button {
            background: none;
            border: none;
            margin-left: 8px;
            cursor: pointer;
            font-size: 1rem;
            color: #888;
            transition: 0.1s;
        }
        .page-actions button:hover { color: var(--secondary); }
        .canvas-container {
            position: relative;
            background: #fef9ef;
            min-height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .image-layer {
            position: relative;
            width: 100%;
            cursor: crosshair;
        }
        .page-img {
            width: 100%;
            display: block;
            object-fit: contain;
            max-height: 420px;
            pointer-events: auto;
            user-select: none;
        }
        .draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: auto;
            touch-action: none;
        }
        .blank-placeholder {
            background: #f7f0e3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 380px;
            color: #b0a088;
            font-style: italic;
        }
        .page-footer {
            padding: 12px;
            background: #fffaf5;
            border-top: 1px solid #ffe0e7;
            display: flex;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }
        .page-footer button {
            background: #ffe4ed;
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        /* Modal para subir/importar imágenes */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            animation: fadeUp 0.3s;
        }
        @keyframes fadeUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-card input, .modal-card textarea {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 60px;
            border: 2px solid #ffb6c1;
        }
        .img-preview {
            max-width: 100%;
            max-height: 200px;
            margin: 10px 0;
            border-radius: 20px;
        }
        .close-modal {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 20px;
            margin-top: 15px;
        }

        /* Responsive */
        @media (max-width: 880px) {
            .pages-container { gap: 20px; }
            .book-page { width: 320px; }
        }
        @media (max-width: 760px) {
            .book-page { width: 100%; max-width: 420px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .tool-group { justify-content: center; }
        }
        @media (max-width: 550px) {
            body { padding: 10px; }
            .book-page .canvas-container { min-height: 280px; }
        }

        .dragging-ghost {
            opacity: 0.5;
            background: #ffd9e4;
        }
        .notification-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6b8b;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 3000;
            font-weight: 500;
            transition: 0.2s;
        }
    </style>
</head>
<body>

<div class="book-workspace">
    <div class="toolbar">
        <div class="tool-group">
            <button class="tool-btn" id="addBlankPageBtn"><i class="fas fa-plus-circle"></i> Pág. Blanca</button>
            <button class="tool-btn" id="importImageBtn"><i class="fas fa-image"></i> Importar Imagen</button>
            <button class="tool-btn" id="importUrlBtn"><i class="fas fa-link"></i> Desde Web</button>
            <button class="tool-btn tool-btn-primary" id="saveAsPdfBtn"><i class="fas fa-file-pdf"></i> Guardar Libro (PDF)</button>
        </div>
        <div class="tool-group">
            <button class="tool-btn" id="resetBookBtn"><i class="fas fa-trash-alt"></i> Nuevo Libro</button>
            <button class="tool-btn" id="exportDataBtn"><i class="fas fa-save"></i> Guardar Proyecto</button>
            <input type="file" id="importProjectFile" accept=".json" style="display:none">
            <button class="tool-btn" id="loadProjectBtn"><i class="fas fa-folder-open"></i> Cargar Libro</button>
        </div>
    </div>

    <div class="book-viewer">
        <div class="pages-container" id="pagesContainer">
            <!-- Las páginas se generarán dinámicamente -->
        </div>
    </div>
</div>

<!-- Modales -->
<div id="imageModal" class="modal-overlay">
    <div class="modal-card">
        <h3><i class="fas fa-upload"></i> Añadir Imagen a Página</h3>
        <input type="file" id="modalFileInput" accept="image/*">
        <p style="margin:10px">O pega URL de imagen</p>
        <input type="text" id="modalUrlInput" placeholder="https://...">
        <div id="modalPreview"></div>
        <button id="confirmAddImageBtn" class="close-modal">Agregar a la página actual</button>
        <button id="closeModalBtn" style="background:#ccc; margin-top:10px">Cancelar</button>
    </div>
</div>

<div id="drawModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h3>🖌️ Dibujar sobre la página</h3>
        <p>Selecciona color y trazo</p>
        <input type="color" id="drawColor" value="#ff2e63">
        <input type="range" id="drawWidth" min="1" max="20" value="4">
        <button id="clearDrawingBtn" class="tool-btn">Borrar dibujo</button>
        <button id="closeDrawModalBtn" class="close-modal">Cerrar</button>
    </div>
</div>

<script>
    // ---------- MODELO DE DATOS ----------
    let pages = [];  // cada página: { id, elements: [{type:'image', src, drawDataURL?}] , drawCanvasData (base64), backgroundStyle }
    let nextId = 1;
    let currentDrawingPageId = null;  // página donde se está dibujando activamente
    let activeDrawCanvas = null;
    let drawingEnabled = false;
    let drawCtx = null;

    // Helper: guardar estado de dibujo (dataURL del canvas)
    function captureDrawData(pageId) {
        const pageDiv = document.querySelector(`.book-page[data-page-id='${pageId}']`);
        if(pageDiv) {
            const drawCanvas = pageDiv.querySelector('.draw-canvas');
            if(drawCanvas) {
                const dataURL = drawCanvas.toDataURL();
                const pageIndex = pages.findIndex(p => p.id == pageId);
                if(pageIndex !== -1) {
                    pages[pageIndex].drawDataURL = dataURL;
                }
            }
        }
    }

    // Restaurar dibujo en canvas después de render
    function restoreDrawOnPage(pageId, canvasElem) {
        const pageData = pages.find(p => p.id == pageId);
        if(pageData && pageData.drawDataURL && canvasElem) {
            const img = new Image();
            img.src = pageData.drawDataURL;
            img.onload = () => {
                const ctx = canvasElem.getContext('2d');
                canvasElem.width = canvasElem.clientWidth;
                canvasElem.height = canvasElem.clientHeight;
                ctx.drawImage(img, 0, 0, canvasElem.width, canvasElem.height);
            };
        }
    }

    // Renderizar todas las páginas
    function renderBook() {
        const container = document.getElementById('pagesContainer');
        container.innerHTML = '';
        pages.forEach((page, idx) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'book-page';
            pageDiv.setAttribute('data-page-id', page.id);
            pageDiv.setAttribute('draggable', 'true');
            // eventos de arrastre para reordenar (táctil + ratón)
            pageDiv.addEventListener('dragstart', handleDragStart);
            pageDiv.addEventListener('dragover', handleDragOver);
            pageDiv.addEventListener('drop', handleDrop);
            pageDiv.addEventListener('dragend', handleDragEnd);
            
            // Header
            const header = document.createElement('div');
            header.className = 'page-header';
            header.innerHTML = `<span class="page-number">Página ${idx+1}</span>
                                <div class="page-actions">
                                    <button class="delete-page" data-id="${page.id}"><i class="fas fa-trash"></i></button>
                                    <button class="draw-toggle" data-id="${page.id}"><i class="fas fa-paint-brush"></i></button>
                                </div>`;
            // Contenedor de imagen / lienzo
            const canvasContainer = document.createElement('div');
            canvasContainer.className = 'canvas-container';
            const imageLayer = document.createElement('div');
            imageLayer.className = 'image-layer';
            let mainImage = null;
            const hasImage = page.elements && page.elements.length > 0 && page.elements[0].type === 'image';
            if(hasImage) {
                const imgElem = document.createElement('img');
                imgElem.src = page.elements[0].src;
                imgElem.className = 'page-img';
                imgElem.style.maxWidth = '100%';
                imgElem.style.pointerEvents = 'none';
                imageLayer.appendChild(imgElem);
            } else {
                const blankDiv = document.createElement('div');
                blankDiv.className = 'blank-placeholder';
                blankDiv.innerHTML = '<i class="fas fa-book-open" style="font-size:3rem; opacity:0.4;"></i><p>Página en blanco</p><small>Haz clic en importar</small>';
                imageLayer.appendChild(blankDiv);
            }
            // Canvas de dibujo
            const drawCanvas = document.createElement('canvas');
            drawCanvas.className = 'draw-canvas';
            drawCanvas.style.position = 'absolute';
            drawCanvas.style.top = '0';
            drawCanvas.style.left = '0';
            drawCanvas.style.width = '100%';
            drawCanvas.style.height = '100%';
            drawCanvas.width = 380;
            drawCanvas.height = 380;
            drawCanvas.style.pointerEvents = 'none'; // inicialmente desactivado
            drawCanvas.setAttribute('data-page', page.id);
            imageLayer.appendChild(drawCanvas);
            canvasContainer.appendChild(imageLayer);
            
            // Footer
            const footer = document.createElement('div');
            footer.className = 'page-footer';
            footer.innerHTML = `<button class="add-img-footer" data-id="${page.id}"><i class="fas fa-plus"></i> Imagen</button>
                                <button class="blank-page-footer" data-id="${page.id}"><i class="far fa-file"></i> Convertir en Blanca</button>
                                <button class="clear-draw-footer" data-id="${page.id}"><i class="fas fa-eraser"></i> Limpiar dibujo</button>`;
            
            pageDiv.appendChild(header);
            pageDiv.appendChild(canvasContainer);
            pageDiv.appendChild(footer);
            container.appendChild(pageDiv);
            
            // restaurar dibujo guardado
            restoreDrawOnPage(page.id, drawCanvas);
            // configurar evento de dibujo después de render
            const drawBtn = header.querySelector('.draw-toggle');
            drawBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleDrawingMode(page.id, drawCanvas);
            });
            // eliminar página
            header.querySelector('.delete-page').addEventListener('click', () => deletePage(page.id));
            // Botones footer
            footer.querySelector('.add-img-footer').addEventListener('click', () => openImageModalForPage(page.id));
            footer.querySelector('.blank-page-footer').addEventListener('click', () => convertToBlank(page.id));
            footer.querySelector('.clear-draw-footer').addEventListener('click', () => clearDrawingOnPage(page.id, drawCanvas));
        });
        // Actualizar números de página luego de reordenar
        updatePageNumbers();
    }

    // Alternar modo dibujo
    function toggleDrawingMode(pageId, canvasElem) {
        if(currentDrawingPageId === pageId && drawingEnabled) {
            // desactivar
            drawingEnabled = false;
            canvasElem.style.pointerEvents = 'none';
            currentDrawingPageId = null;
            showToast("Dibujo desactivado");
        } else {
            // desactivar cualquier otro activo
            if(currentDrawingPageId) {
                const prevCanvas = document.querySelector(`.book-page[data-page-id='${currentDrawingPageId}'] .draw-canvas`);
                if(prevCanvas) prevCanvas.style.pointerEvents = 'none';
            }
            drawingEnabled = true;
            currentDrawingPageId = pageId;
            canvasElem.style.pointerEvents = 'auto';
            setupDrawing(canvasElem);
            showToast("✏️ Modo dibujo activado - usa el dedo o ratón");
        }
    }

    function setupDrawing(canvas) {
        let ctx = canvas.getContext('2d');
        let painting = false;
        let lastX = 0, lastY = 0;
        const setCanvasSize = () => {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            const pageId = canvas.getAttribute('data-page');
            const pageData = pages.find(p => p.id == pageId);
            if(pageData && pageData.drawDataURL) {
                const img = new Image();
                img.src = pageData.drawDataURL;
                img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.clearRect(0,0,canvas.width,canvas.height);
            }
        };
        setCanvasSize();
        window.addEventListener('resize', () => setCanvasSize());
        
        const getCoords = (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.min(Math.max(0, x), canvas.width);
            y = Math.min(Math.max(0, y), canvas.height);
            return { x, y };
        };
        
        const draw = (e) => {
            if(!painting) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            const color = document.getElementById('drawColor')?.value || '#ff2e63';
            const width = document.getElementById('drawWidth')?.value || 4;
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x;
            lastY = y;
            // guardar en dataURL
            const pageId = canvas.getAttribute('data-page');
            const pageIndex = pages.findIndex(p => p.id == pageId);
            if(pageIndex !== -1) pages[pageIndex].drawDataURL = canvas.toDataURL();
        };
        
        const start = (e) => {
            painting = true;
            const { x, y } = getCoords(e);
            lastX = x; lastY = y;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x+0.5, y+0.5);
            ctx.stroke();
            e.preventDefault();
        };
        const end = () => { painting = false; };
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', end);
    }
    
    function clearDrawingOnPage(pageId, canvasElem) {
        const ctx = canvasElem.getContext('2d');
        ctx.clearRect(0, 0, canvasElem.width, canvasElem.height);
        const idx = pages.findIndex(p => p.id == pageId);
        if(idx !== -1) pages[idx].drawDataURL = null;
        showToast("Dibujo borrado");
    }
    
    function deletePage(id) {
        pages = pages.filter(p => p.id !== id);
        if(pages.length === 0) addBlankPage(); // al menos una página
        renderBook();
    }
    
    function addBlankPage() {
        const newId = nextId++;
        pages.push({ id: newId, elements: [], drawDataURL: null });
        renderBook();
    }
    
    function convertToBlank(pageId) {
        const idx = pages.findIndex(p => p.id === pageId);
        if(idx !== -1) {
            pages[idx].elements = [];
            pages[idx].drawDataURL = null;
            renderBook();
            showToast("Página convertida a blanco");
        }
    }
    
    function addImageToPage(pageId, imageSrc) {
        const idx = pages.findIndex(p => p.id === pageId);
        if(idx !== -1) {
            pages[idx].elements = [{ type: 'image', src: imageSrc }];
            renderBook();
            showToast("Imagen añadida");
        }
    }
    
    function openImageModalForPage(pageId) {
        window.tempPageId = pageId;
        const modal = document.getElementById('imageModal');
        modal.style.display = 'flex';
        document.getElementById('modalFileInput').value = '';
        document.getElementById('modalUrlInput').value = '';
        document.getElementById('modalPreview').innerHTML = '';
    }
    
    // Subida de archivo o URL
    document.getElementById('confirmAddImageBtn').onclick = () => {
        const file = document.getElementById('modalFileInput').files[0];
        const url = document.getElementById('modalUrlInput').value.trim();
        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => { addImageToPage(window.tempPageId, e.target.result); closeModal(); };
            reader.readAsDataURL(file);
        } else if(url) {
            addImageToPage(window.tempPageId, url);
            closeModal();
        } else {
            alert("Selecciona una imagen o URL");
        }
    };
    document.getElementById('closeModalBtn').onclick = closeModal;
    function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
    
    // Ordenamiento Drag & drop
    let dragSrcIndex = null;
    function handleDragStart(e) {
        const pageDiv = e.target.closest('.book-page');
        if(!pageDiv) return;
        const id = parseInt(pageDiv.getAttribute('data-page-id'));
        dragSrcIndex = pages.findIndex(p => p.id === id);
        e.dataTransfer.setData('text/plain', id);
        e.dataTransfer.effectAllowed = 'move';
        pageDiv.classList.add('dragging-ghost');
    }
    function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function handleDrop(e) {
        e.preventDefault();
        const targetPage = e.target.closest('.book-page');
        if(!targetPage || dragSrcIndex === null) return;
        const targetId = parseInt(targetPage.getAttribute('data-page-id'));
        const targetIndex = pages.findIndex(p => p.id === targetId);
        if(dragSrcIndex !== targetIndex) {
            const [moved] = pages.splice(dragSrcIndex, 1);
            pages.splice(targetIndex, 0, moved);
            renderBook();
        }
        dragSrcIndex = null;
        document.querySelectorAll('.book-page').forEach(p => p.classList.remove('dragging-ghost'));
    }
    function handleDragEnd(e) { document.querySelectorAll('.book-page').forEach(p => p.classList.remove('dragging-ghost')); dragSrcIndex = null; }
    
    function updatePageNumbers() { /* solo visual, se actualiza en render */ }
    
    // Guardar libro como PDF usando html2pdf
    async function saveAsPDF() {
        const element = document.getElementById('pagesContainer');
        const opt = {
            margin:        [0.5, 0.5, 0.5, 0.5],
            filename:     'libro_amor_KIM.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, logging: false },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        showToast("Generando PDF... puede tomar unos segundos");
        try {
            await html2pdf().set(opt).from(element).save();
            showToast("📖 PDF guardado exitosamente");
        } catch(err) { showToast("Error generando PDF: "+err); }
    }
    
    // Guardar proyecto (JSON)
    function saveProject() {
        const data = JSON.stringify({ pages, nextId });
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = 'mi_libro_amor.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast("Proyecto guardado");
    }
    function loadProjectFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const obj = JSON.parse(e.target.result);
                pages = obj.pages;
                nextId = obj.nextId;
                renderBook();
                showToast("Libro cargado correctamente");
            } catch(err) { alert("Archivo inválido"); }
        };
        reader.readAsText(file);
    }
    document.getElementById('exportDataBtn').onclick = saveProject;
    document.getElementById('loadProjectBtn').onclick = () => document.getElementById('importProjectFile').click();
    document.getElementById('importProjectFile').onchange = (e) => { if(e.target.files[0]) loadProjectFromFile(e.target.files[0]); };
    document.getElementById('resetBookBtn').onclick = () => { pages = [{ id: 1, elements: [], drawDataURL: null }]; nextId=2; renderBook(); };
    document.getElementById('addBlankPageBtn').onclick = addBlankPage;
    document.getElementById('importImageBtn').onclick = () => { if(pages.length) openImageModalForPage(pages[0].id); else addBlankPage(); };
    document.getElementById('importUrlBtn').onclick = () => { if(pages.length) openImageModalForPage(pages[0].id); else addBlankPage(); };
    document.getElementById('saveAsPdfBtn').onclick = saveAsPDF;
    
    // Dibujar modal de opciones
    function showToast(msg) {
        let toast = document.querySelector('.notification-toast');
        if(toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'notification-toast';
        toast.innerHTML = `<i class="fas fa-heart"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    // Inicializar libro por defecto con una página en blanco
    pages = [{ id: 1, elements: [], drawDataURL: null }];
    nextId = 2;
    renderBook();
    
    // Adicional: botón para abrir panel de dibujo modal (opcional)
    const drawModal = document.getElementById('drawModal');
    document.getElementById('clearDrawingBtn').onclick = () => {
        if(currentDrawingPageId) {
            const canvas = document.querySelector(`.book-page[data-page-id='${currentDrawingPageId}'] .draw-canvas`);
            if(canvas) clearDrawingOnPage(currentDrawingPageId, canvas);
        }
        drawModal.style.display = 'none';
    };
    document.getElementById('closeDrawModalBtn').onclick = () => drawModal.style.display = 'none';
    // para acceder rápido a herramientas de dibujo se puede usar un botón extra, pero no interfiere
    // asegurar que se guarde dibujo al cambiar página
    window.addEventListener('beforeunload', () => { if(currentDrawingPageId) captureDrawData(currentDrawingPageId); });
</script>
</body>
</html>
